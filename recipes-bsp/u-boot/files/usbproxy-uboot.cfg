# U-Boot config fragment for the usb-proxy appliance.

# DRAM stability. The Orange Pi Zero defaults to 624MHz DRAM, which is marginal
# on many units — especially when the board is powered over the micro-USB from a
# host port (voltage droop). The symptom is intermittent kernel oopses at boot
# with corrupt pointers (e.g. a page-clear faulting at a garbage address), i.e.
# random memory corruption. Lowering to 480MHz gives timing margin and draws a
# little less; a USB proxy isn't memory-bandwidth-bound so the cost is nil.
# (Most robust paired with a solid 5V supply rather than host-port power.)
CONFIG_DRAM_CLK=480

# No interactive countdown before booting.
CONFIG_BOOTDELAY=0

# The kernel carries a bundled initramfs. sunxi's default max bootm load size
# (~8MB) is tight: the bundled uImage was ~10MB before trimming (failed with
# "uncompress error -28" / -ENOSPC) and is ~6MB now — under the default, but only
# just. Keep the limit raised so it still loads with headroom if the image grows.
CONFIG_SYS_BOOTM_LEN=0x4000000

# Don't scan USB at boot. sunxi sets CONFIG_PREBOOT="usb start" (to allow a USB
# keyboard to interrupt autoboot), which probes every USB bus before boot and
# costs noticeable time. This appliance is headless, so drop the USB keyboard
# and clear preboot — boot goes straight to MMC.
# (The Ethernet PHY power-down is done at runtime in /usr/bin/power-tune, which
# needs read-modify-write on shared CCU registers — awkward/untestable in a
# preboot string, clean in shell via devmem.)
# CONFIG_USB_KEYBOARD is not set
CONFIG_PREBOOT=""

# Power: don't power up the on-SoC Ethernet PHY. u-boot's SUN8I_EMAC driver
# de-resets and clocks the H3 internal EPHY at probe (lighting the RJ45 LEDs and
# drawing ~150-250mW) purely so it can try net-boot. This appliance never net-
# boots (it boots from MMC), and the kernel has emac disabled too, so drop the
# driver entirely — the EPHY stays in its powered-down reset state.
# CONFIG_SUN8I_EMAC is not set

# Note on "disable USB boot": CMD_USB/CMD_PXE/CMD_DHCP are force-selected by
# U-Boot's distro defaults (which meta-sunxi's boot.scr flow relies on), so they
# can't be turned off with a plain fragment without breaking booting. It doesn't
# cost boot time: distro_bootcmd scans mmc0 first, finds boot.scr and boots, so
# the USB/network boot targets are never reached on a normal SD boot.

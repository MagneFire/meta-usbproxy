# U-Boot config fragment for the usb-proxy appliance: boot only from SD, fast.

# No interactive countdown before booting.
CONFIG_BOOTDELAY=0

# Don't probe USB or the network for boot media — boot straight from MMC. This
# removes the usb0/pxe/dhcp targets from the distro boot scan (faster, and the
# appliance has no network). The USB *host* controller drivers remain; only the
# boot-time scanning commands are dropped.
# CONFIG_CMD_USB is not set
# CONFIG_USB_STORAGE is not set
# CONFIG_CMD_PXE is not set
# CONFIG_CMD_DHCP is not set

# U-Boot config fragment for the usb-proxy appliance.

# No interactive countdown before booting — the main U-Boot boot-time win.
CONFIG_BOOTDELAY=0

# Note on "disable USB boot": CMD_USB/CMD_PXE/CMD_DHCP are force-selected by
# U-Boot's distro defaults (which meta-sunxi's boot.scr flow relies on), so they
# can't be turned off with a plain fragment without breaking booting. It doesn't
# cost boot time: distro_bootcmd scans mmc0 first, finds boot.scr and boots, so
# the USB/network boot targets are never reached on a normal SD boot.

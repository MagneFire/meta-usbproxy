require conf/distro/poky.conf

DISTRO = "usbproxy"
DISTRO_NAME = "usb-proxy appliance"
DISTRO_VERSION = "1.0"
MAINTAINER = "usb-proxy appliance"
SDK_VENDOR = "-usbproxysdk"

# BusyBox init + mdev as PID 1 / device manager: no systemd, no udev, no
# sysvinit churn. /etc/inittab respawns usb-proxy directly (see the busybox
# bbappend). This is the fastest, smallest init for a single-purpose appliance.
INIT_MANAGER = "mdev-busybox"

# Single-purpose USB proxy: strip wireless / graphics / audio / network-service
# stacks. We keep ipv4/ipv6 as a harmless libc/kernel capability but install no
# networking daemons and bring up no interfaces, so boot never waits on network.
DISTRO_FEATURES:remove = "wifi bluetooth nfc 3g x11 wayland vulkan opengl gles2 \
                          alsa pulseaudio bluez5 nfs zeroconf irda"

# Never ship a package manager on the device.
DISTRO_FEATURES_BACKFILL_CONSIDERED += "pulseaudio"
PACKAGE_CLASSES ?= "package_ipk"

# Keep the feed/config tidy; appliance has no use for these.
DISTRO_FEATURES_BACKFILL_CONSIDERED += "gobject-introspection-data"

# meta-usbproxy — minimal read-only USB-proxy appliance layer for Orange Pi Zero
BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "usbproxy"
BBFILE_PATTERN_usbproxy = "^${LAYERDIR}/"
BBFILE_PRIORITY_usbproxy = "20"

# Depends on OE-Core ("core") and meta-sunxi ("sunxi"). meta-sunxi in turn pulls
# in meta-oe / meta-python / meta-arm (see README for the full bblayers set).
LAYERDEPENDS_usbproxy = "core sunxi"
LAYERSERIES_COMPAT_usbproxy = "scarthgap"

# This layer ships a distro.
LAYERVERSION_usbproxy = "1"

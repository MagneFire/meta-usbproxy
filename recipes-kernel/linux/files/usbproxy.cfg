# usb-proxy appliance kernel config fragment (Orange Pi Zero / sunxi musb).
# Everything the device side of usb-proxy needs, built-in (=y) so it is present
# at boot with no module loading.

# raw-gadget: the UDC interface usb-proxy drives (/dev/raw-gadget).
CONFIG_USB_GADGET=y
CONFIG_USB_RAW_GADGET=y

# sunxi musb peripheral controller + its USB PHY.
#
# DUAL_ROLE: the megous patch (0002) keeps host code compiled but forces musb
# into peripheral mode on H3 (host is handled by EHCI/OHCI). NOP_USB_XCEIV is
# required by the musb sunxi glue (it registers a generic transceiver itself).
CONFIG_USB_MUSB_HDRC=y
CONFIG_USB_MUSB_SUNXI=y
CONFIG_USB_MUSB_DUAL_ROLE=y
CONFIG_NOP_USB_XCEIV=y
CONFIG_PHY_SUN4I_USB=y

# musbfix is obsolete here: the RX-requeue fix is patched directly into
# drivers/usb/musb/musb_gadget.c, so KPROBES/FTRACE are no longer required.

# Root filesystem is an initramfs bundled into the kernel (no rootfs partition).
# CONFIG_BLK_DEV_INITRD gates the embedded INITRAMFS_SOURCE that
# INITRAMFS_IMAGE_BUNDLE wires in.
#
# We do NOT set CONFIG_CMDLINE here: meta-sunxi's machine config already sets
# CONFIG_CMDLINE=" loglevel=3" (a string CONFIG, so the machine value wins over a
# fragment anyway), which keeps the serial console quiet at boot. And we don't
# need rdinit= — the bundled initramfs ships /init -> /sbin/init (BusyBox), which
# the kernel runs as PID 1 by default, so the bootloader's root=/rootwait are
# never reached.
CONFIG_BLK_DEV_INITRD=y

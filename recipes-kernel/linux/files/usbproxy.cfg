# usb-proxy appliance kernel config fragment (Orange Pi Zero / sunxi musb).
# Everything the device side of usb-proxy needs, built-in (=y) so it is present
# at boot with no module loading.

# raw-gadget: the UDC interface usb-proxy drives (/dev/raw-gadget).
CONFIG_USB_GADGET=y
CONFIG_USB_RAW_GADGET=y

# sunxi musb peripheral controller + its USB PHY.
#
# DUAL_ROLE: the megous patch (0002) keeps host code compiled but forces musb
# into peripheral mode on H3 (host is handled by EHCI/OHCI). NOP_USB_XCEIV is
# required by the musb sunxi glue (it registers a generic transceiver itself).
CONFIG_USB_MUSB_HDRC=y
CONFIG_USB_MUSB_SUNXI=y
CONFIG_USB_MUSB_DUAL_ROLE=y
CONFIG_NOP_USB_XCEIV=y
CONFIG_PHY_SUN4I_USB=y

# musbfix is obsolete here: the RX-requeue fix is patched directly into
# drivers/usb/musb/musb_gadget.c, so KPROBES/FTRACE are no longer required.

# Root filesystem is an initramfs bundled into the kernel (no rootfs partition).
# CONFIG_BLK_DEV_INITRD gates the embedded INITRAMFS_SOURCE that
# INITRAMFS_IMAGE_BUNDLE wires in.
#
# Quiet boot. meta-sunxi sets CONFIG_CMDLINE=" loglevel=3", but the kernel's
# default cmdline source is CMDLINE_FROM_BOOTLOADER, which IGNORES CONFIG_CMDLINE
# entirely — so without this the ~150 boot messages flood the 115200 console
# (slow + noisy). CMDLINE_EXTEND appends CONFIG_CMDLINE (the loglevel=3) to the
# bootloader's args, restoring the quiet ~0.36s boot. We don't set CONFIG_CMDLINE
# No rdinit= needed — the bundled initramfs ships /init (BusyBox), run as PID 1
# by default.
#
# IMPORTANT (learned the hard way, see git history): BOTH lines below are
# required. CMDLINE_{FROM_BOOTLOADER,EXTEND,FORCE} is a Kconfig *choice* whose
# defconfig default is FROM_BOOTLOADER. In this recipe's merge, CMDLINE_EXTEND=y
# only wins the choice when a non-empty CONFIG_CMDLINE is also set in the same
# fragment — EXTEND alone (or with FROM_BOOTLOADER turned off) silently reverts
# to the default and the boot becomes verbose. meta-sunxi's do_configure then
# overwrites the string to " loglevel=3" (which is what we want anyway); our
# "quiet" here just has to be non-empty for EXTEND to stick.
CONFIG_CMDLINE_EXTEND=y
CONFIG_CMDLINE="quiet"
CONFIG_BLK_DEV_INITRD=y

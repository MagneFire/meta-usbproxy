# ============================================================================
# Appliance kernel trim.
#
# Single-purpose, headless USB-gadget proxy: no network, no display, no audio,
# no camera, mounts no on-disk filesystem (rootfs is the bundled initramfs in
# RAM; u-boot reads the FAT /boot itself). Disabling these whole subsystems makes
# their (mostly modular) drivers drop out entirely (=n, not compiled), which
# shrinks the image, speeds the boot (fewer probes), and cuts compile time.
#
# NB: do NOT set CONFIG_MODULES=n here. The defconfig marks ~630 drivers =m; with
# modules disabled, oldconfig promotes the still-enabled ones to =y (built into
# vmlinux) instead of dropping them — that made the kernel BIGGER and slower to
# build. Keep MODULES=y and instead turn the unused subsystems off at the source.
# ============================================================================

# ---- Networking: keep the core but strip everything around it. CONFIG_NET MUST
# stay =y: libusb is built --disable-udev, so it opens a NETLINK_KOBJECT_UEVENT
# socket for hotplug, and CONFIG_NET=n makes libusb_init() fail with
# LIBUSB_ERROR_OTHER ("Init error: Other error") — the gadget never attaches.
# So instead drop all the bulk: every NIC/wifi/USB-net driver (NETDEVICES),
# Bluetooth, IPv6 and netfilter. The appliance has no network interface; only
# the netlink/socket core remains. ----
# CONFIG_NETDEVICES is not set
# CONFIG_WLAN is not set
# CONFIG_CFG80211 is not set
# CONFIG_BT is not set
# CONFIG_NETFILTER is not set
# No IP stack at all — libusb's hotplug netlink lives in the NET core, not INET,
# so we can drop IPv4/IPv6 and all their extras (tunnels, TCP congestion algos).
# CONFIG_INET is not set
# CONFIG_IPV6 is not set
# CONFIG_NET_SCHED is not set
# CONFIG_PACKET is not set
# CONFIG_XFRM_USER is not set
# CONFIG_L2TP is not set
# CONFIG_BRIDGE is not set
# CONFIG_VLAN_8021Q is not set
# CONFIG_9P_FS is not set

# ---- No sound ----
# CONFIG_SOUND is not set
# CONFIG_SND is not set

# ---- No display / graphics ----
# CONFIG_DRM is not set
# CONFIG_FB is not set
# CONFIG_BACKLIGHT_CLASS_DEVICE is not set
# CONFIG_LOGO is not set

# ---- No camera / media ----
# CONFIG_MEDIA_SUPPORT is not set

# ---- No RAID / device-mapper / extra block devices (no complex storage; the
# rootfs is in RAM) ----
# CONFIG_MD is not set
# CONFIG_BLK_DEV_LOOP is not set
# CONFIG_BLK_DEV_NBD is not set
# CONFIG_OVERLAY_FS is not set
# CONFIG_UDF_FS is not set

# ---- No unused USB classes: no USB-serial dongles, no USB mass-storage, no HID
# (headless). usb-proxy drives the device via raw-gadget + libusb/usbfs. ----
# CONFIG_USB_SERIAL is not set
# CONFIG_USB_STORAGE is not set
# CONFIG_USB_HID is not set
# CONFIG_HID is not set

# ---- No kernel tracing / profiling (the old musbfix kprobe is long gone) ----
# CONFIG_FTRACE is not set
# CONFIG_KPROBES is not set
# CONFIG_PROFILING is not set

# ---- No on-disk filesystems: rootfs is the in-RAM initramfs (cpio); the kernel
# never mounts the SD. Keep only tmpfs/proc/sysfs/devtmpfs (configured elsewhere).
# CONFIG_EXT4_FS is not set
# CONFIG_FAT_FS is not set
# CONFIG_BTRFS_FS is not set
# CONFIG_XFS_FS is not set
# CONFIG_F2FS_FS is not set
# CONFIG_FUSE_FS is not set

# ============================================================================
# Deep trim — H3-only, single-purpose. The USB datapath (musb/raw-gadget/EHCI/
# OHCI/PHY), serial console, H3 clocks/pinctrl/DMA/reset/regulator, cpufreq +
# CPU hotplug, devmem, watchdog and the netlink core are all KEPT.
# ============================================================================

# ---- Other Allwinner SoCs: this is an H3 (sun8i). Drop every non-H3 pinctrl and
# clock (CCU) driver — pure dead weight (large static pin/clk tables).
# Kept: PINCTRL_SUN8I_H3(+_R), SUN8I_H3_CCU, SUN8I_R_CCU, RTC_CCU.
#
# NB: do NOT disable the MACH_SUN*I machine options. They are tiny but carry
# critical platform `select`s — in particular MACH_SUN7I is the only one that
# selects HAVE_ARM_ARCH_TIMER, so turning it off drops the 24MHz ARM arch timer
# for the WHOLE kernel (the H3 falls back to a 100Hz dummy timer → secondary CPUs
# never come up, ~10s probe stalls, USB mis-init). Leave all MACH_SUN*I enabled.
# CONFIG_PINCTRL_SUN4I_A10 is not set
# CONFIG_PINCTRL_SUN5I is not set
# CONFIG_PINCTRL_SUN6I_A31 is not set
# CONFIG_PINCTRL_SUN6I_A31_R is not set
# CONFIG_PINCTRL_SUN8I_A23 is not set
# CONFIG_PINCTRL_SUN8I_A33 is not set
# CONFIG_PINCTRL_SUN8I_A83T is not set
# CONFIG_PINCTRL_SUN8I_A83T_R is not set
# CONFIG_PINCTRL_SUN8I_A23_R is not set
# CONFIG_PINCTRL_SUN8I_V3S is not set
# CONFIG_PINCTRL_SUN9I_A80 is not set
# CONFIG_PINCTRL_SUN9I_A80_R is not set
# CONFIG_PINCTRL_SUN20I_D1 is not set
# CONFIG_SUN4I_A10_CCU is not set
# CONFIG_SUN5I_CCU is not set
# CONFIG_SUN6I_A31_CCU is not set
# CONFIG_SUN8I_A23_CCU is not set
# CONFIG_SUN8I_A33_CCU is not set
# CONFIG_SUN8I_A83T_CCU is not set
# CONFIG_SUN8I_V3S_CCU is not set
# CONFIG_SUN8I_DE2_CCU is not set
# CONFIG_SUN8I_R40_CCU is not set
# CONFIG_SUN9I_A80_CCU is not set
# CONFIG_SUN20I_D1_CCU is not set
# CONFIG_SUN20I_D1_R_CCU is not set

# ---- Kernel features this appliance never uses ----
# CONFIG_BPF_SYSCALL is not set
# CONFIG_CGROUPS is not set
# CONFIG_NAMESPACES is not set
# CONFIG_HIBERNATION is not set
# (SUSPEND left enabled: ARCH_SUNXI_MC_SMP / cpuidle pull in ARM_CPU_SUSPEND.)
# CONFIG_FW_LOADER is not set
# CONFIG_NLS is not set
# CONFIG_VT is not set
# CONFIG_INPUT is not set

# ---- Unused buses / peripherals. No I2C/SPI/flash/ADC/PWM devices; no PMIC on
# the Zero; the SD is read by u-boot only (kernel runs from RAM, never mounts it);
# light load so no thermal throttling needed. ----
# CONFIG_I2C is not set
# CONFIG_SPI is not set
# CONFIG_MTD is not set
# CONFIG_IIO is not set
# CONFIG_PWM is not set
# CONFIG_THERMAL is not set
# CONFIG_HWMON is not set
# CONFIG_MMC is not set
# CONFIG_RTC_CLASS is not set
# CONFIG_SOUNDWIRE is not set


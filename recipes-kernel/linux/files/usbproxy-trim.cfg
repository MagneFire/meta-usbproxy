# ============================================================================
# Appliance kernel trim.
#
# This is a single-purpose, headless USB-gadget proxy: no display, no audio, no
# camera, it mounts no on-disk filesystem (the rootfs is the bundled initramfs
# in RAM; u-boot reads the FAT /boot itself), and it loads no kernel modules
# (everything it needs — musb gadget, raw-gadget, EHCI/OHCI host, sunxi PHY,
# MMC, 8250 serial, H3 pinctrl/CCU/RTC — is built in =y). Cutting the unused
# subsystems shrinks the image, speeds the boot (fewer driver probes), and
# slashes compile time.
#
# NOTE: networking (CONFIG_NET) is deliberately left ON here — it pulls in
# netlink uevents and is cheap insurance for hotplug/device-node paths; trimming
# it is a separate, verified step.
# ============================================================================

# ---- No loadable modules. The defconfig builds ~630 .ko we never load; this is
# the single biggest compile-time saving, and it also drops the module loader.
# Verified first that every boot/USB-proxy driver is already =y. ----
# CONFIG_MODULES is not set

# ---- No sound ----
# CONFIG_SOUND is not set
# CONFIG_SND is not set

# ---- No display / graphics (no usable video out for this appliance) ----
# CONFIG_DRM is not set
# CONFIG_FB is not set
# CONFIG_BACKLIGHT_CLASS_DEVICE is not set
# CONFIG_LOGO is not set

# ---- No camera / media ----
# CONFIG_MEDIA_SUPPORT is not set

# ---- No kernel tracing / profiling (the old musbfix kprobe is long gone) ----
# CONFIG_FTRACE is not set
# CONFIG_KPROBES is not set
# CONFIG_PROFILING is not set

# ---- No on-disk filesystems: rootfs is the in-RAM initramfs (cpio); the kernel
# never mounts the SD. Keep only the in-memory/pseudo filesystems (tmpfs, proc,
# sysfs, devtmpfs), which are configured elsewhere. ----
# CONFIG_EXT4_FS is not set
# CONFIG_FAT_FS is not set
# CONFIG_BTRFS_FS is not set
# CONFIG_XFS_FS is not set
# CONFIG_F2FS_FS is not set
# CONFIG_FUSE_FS is not set
